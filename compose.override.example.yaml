# TrueNAS: Copy this to compose.override.yaml to attach frontend + pgadmin to Nginx Proxy Manager.
# Docker Compose merges this automatically — no need to edit compose.yaml.
# After editing, run: docker compose up -d --force-recreate frontend pgadmin

services:
  frontend:
    networks:
      - internal
      - npm_network
  pgadmin:
    networks:
      - internal
      - npm_network

networks:
  npm_network:
    external: true
