name: driving-heatmap

services:

  db:
    container_name: driving-heatmap-db
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_DB: heatmap
      POSTGRES_USER: heatmap
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatmap -d heatmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - internal

  sync:
    container_name: driving-heatmap-sync
    image: johannesmols/driving-heatmap-sync:latest
    environment:
      DATABASE_URL: postgresql://heatmap:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/heatmap
      CC_EMAIL: ${CC_EMAIL:?CC_EMAIL must be set in .env}
      CC_PASSWORD: ${CC_PASSWORD:?CC_PASSWORD must be set in .env}
      CC_NAMESPACE: ${CC_NAMESPACE:-semler:minvolkswagen}
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-6}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - internal

  api:
    container_name: driving-heatmap-api
    image: johannesmols/driving-heatmap-api:latest
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://heatmap:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/heatmap
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - internal

  frontend:
    container_name: driving-heatmap-frontend
    image: johannesmols/driving-heatmap-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    networks:
      - internal
      - npm_network

  pgadmin:
    container_name: driving-heatmap-pgadmin
    image: dpage/pgadmin4:latest
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set in .env}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - internal
      - npm_network

volumes:
  pgadmin_data:

networks:
  internal:
  npm_network:
    external: true
