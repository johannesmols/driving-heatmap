name: driving-heatmap-dev

# Local development: builds locally, bind-mounts source for hot-reload.
# Run: docker compose -f compose.dev.yaml up -d
# Frontend runs separately via `cd frontend && bun run dev` (Vite proxies /api to localhost:8000).

services:

  db:
    container_name: driving-heatmap-db
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_DB: heatmap
      POSTGRES_USER: heatmap
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatmap -d heatmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  sync:
    container_name: driving-heatmap-sync
    build: ./sync
    volumes:
      - ./sync:/app:ro
    environment:
      DATABASE_URL: postgresql://heatmap:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/heatmap
      CC_EMAIL: ${CC_EMAIL:?CC_EMAIL must be set in .env}
      CC_PASSWORD: ${CC_PASSWORD:?CC_PASSWORD must be set in .env}
      CC_NAMESPACE: ${CC_NAMESPACE:-semler:minvolkswagen}
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-6}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  api:
    container_name: driving-heatmap-api
    build: ./api
    volumes:
      - ./api:/app:ro
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://heatmap:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/heatmap
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  pgadmin:
    container_name: driving-heatmap-pgadmin
    image: dpage/pgadmin4:latest
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set in .env}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgadmin_data:

networks:
  internal:
